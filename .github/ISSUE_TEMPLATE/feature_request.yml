name: 機能要望
description: 新機能や改善の提案
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        機能要望ありがとうございます。以下の項目をできるだけ詳しく記入してください。
  - type: textarea
    id: problem
    attributes:
      label: 解決したい課題
      description: どのような場面で困っているか、何を実現したいかを記載してください。
      placeholder: 例）翻訳結果のフォントサイズを変更したい
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 提案する解決策
      description: 具体的にどのような機能・動作を期待するかを記載してください。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 代替案
      description: 他に検討した方法があれば記載してください。
  - type: textarea
    id: additional
    attributes:
      label: 補足情報
      description: スクリーンショットや参考リンクなどがあれば添付してください。
